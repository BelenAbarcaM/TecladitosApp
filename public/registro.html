<html>

 

<head></head>

<body>

 

 <style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#9aabff;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.registro{
    width:420px;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,.25);
}

.registro h1{
    text-align:center;
    color:#333;
    margin-bottom:30px;
}

label{
    display:block;
    margin-top:18px;
    margin-bottom:8px;
    color:#555;
    font-weight:bold;
}

input[type=text],
input[type=password]{
    width:100%;
    padding:14px;
    border-radius:10px;
    border:1px solid #ccc;
    outline:none;
    transition:.3s;
    font-size:16px;
}

input:focus{
    border-color:#667eea;
    box-shadow:0 0 10px rgba(102,126,234,.35);
}

#btn-guardar{
    width:100%;
    margin-top:25px;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#667eea;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

#btn-guardar:hover{
    background:#4b5fd3;
    transform:translateY(-2px);
}

a{
    display:block;
    margin-top:20px;
    text-align:center;
    text-decoration:none;
    color:#667eea;
    font-weight:bold;
}

a:hover{
    text-decoration:underline;
}

</style>

</head>

<body>

<div class="registro">

<h1>Crear cuenta</h1>

<label>Nombre</label>
<input id="nombre" type="text" placeholder="Escriba su nombre">

<label>Email</label>
<input id="email" type="text" placeholder="Escriba su email">

<label>Contraseña</label>
<input id="clave" type="password" placeholder="Escriba su clave">

<input type="button" value="Registrarse" id="btn-guardar">

<a href="login.html">Ya tengo una cuenta</a>

</div>

<script>

 

const btnGuardar = document.getElementById('btn-guardar');

btnGuardar.addEventListener('click', async () => {

  // Obtener colores actuales de cada parte

  const usuario = {

    nombre: document.getElementById('nombre').value,

    email: document.getElementById('email').value,

    clave: document.getElementById('clave').value,

  

  };

  // Enviar via fetch al servidor

  const resp = await fetch('/api/registro', {

    method: 'POST',

    headers: {

      'Content-Type': 'application/json'

    },

    body: JSON.stringify(usuario)

  });

  const data = await resp.json();

  console.log('Usuario guardado en servidor:', data);

  alert('Usuario registrado correctamente. Ahora puede iniciar sesión.');

});

</script>

</body>

</html>
